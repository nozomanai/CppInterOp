name: Windows Cling Build

on:
  # pull_request:
  #   branches: [main]
  # push:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build-windows-cling:
    name: windows-msvc-cling-llvm20
    runs-on: windows-2025
    strategy:
      fail-fast: false

    steps:
    - name: Checkout CppInterOp
      uses: actions/checkout@v6

    - name: Clone cppyy-backend
      run: |
        git clone --depth=1 https://github.com/compiler-research/cppyy-backend.git

    - name: Clone Cling and LLVM
      run: |
        git clone --depth=1 --branch v1.3 https://github.com/root-project/cling.git
        git clone --depth=1 -b cling-llvm20-20260119-01 https://github.com/root-project/llvm-project.git

    - name: Build Cling and LLVM
      shell: pwsh
      run: |
        $env:ncpus = $([Environment]::ProcessorCount)
        $env:PWD_DIR = $PWD.Path
        $env:CLING_DIR = "$env:PWD_DIR\cling"

        New-Item -ItemType Directory -Force -Path llvm-project\build | Out-Null
        Set-Location llvm-project\build

        cmake -DLLVM_ENABLE_PROJECTS=clang `
              -DLLVM_EXTERNAL_PROJECTS=cling `
              -DLLVM_EXTERNAL_CLING_SOURCE_DIR="$env:CLING_DIR" `
              -DLLVM_TARGETS_TO_BUILD="host;NVPTX" `
              -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              -DLLVM_ENABLE_ASSERTIONS=ON `
              -DCLANG_ENABLE_STATIC_ANALYZER=OFF `
              -DCLANG_ENABLE_ARCMT=OFF `
              -DCLANG_ENABLE_FORMAT=OFF `
              -DCLANG_ENABLE_BOOTSTRAP=OFF `
              ../llvm

        cmake --build . --target clang --parallel $env:ncpus
        cmake --build . --target cling --parallel $env:ncpus

    - name: Set environment variables
      shell: pwsh
      run: |
        $env:PWD_DIR = $PWD.Path
        $env:LLVM_DIR = "$env:PWD_DIR\llvm-project"
        $env:CLING_DIR = "$env:PWD_DIR\cling"
        $env:CLING_BUILD_DIR = "$env:PWD_DIR\cling\build"
        $env:CB_PYTHON_DIR = "$env:PWD_DIR\cppyy-backend\python"
        $env:CPPINTEROP_DIR = "$env:CB_PYTHON_DIR\cppyy_backend"

        # Export for subsequent steps
        echo "LLVM_DIR=$env:LLVM_DIR" >> $env:GITHUB_ENV
        echo "CLING_DIR=$env:CLING_DIR" >> $env:GITHUB_ENV
        echo "CLING_BUILD_DIR=$env:CLING_BUILD_DIR" >> $env:GITHUB_ENV
        echo "CB_PYTHON_DIR=$env:CB_PYTHON_DIR" >> $env:GITHUB_ENV
        echo "CPPINTEROP_DIR=$env:CPPINTEROP_DIR" >> $env:GITHUB_ENV
        echo "PWD_DIR=$env:PWD_DIR" >> $env:GITHUB_ENV

    - name: Build CppInterOp
      shell: pwsh
      run: |
        $env:ncpus = $([Environment]::ProcessorCount)

        New-Item -ItemType Directory -Force -Path build | Out-Null
        Set-Location build

        cmake -DCPPINTEROP_USE_CLING=ON `
              -DCPPINTEROP_USE_REPL=Off `
              -DCling_DIR="$env:LLVM_DIR\build\tools\cling" `
              -DLLVM_DIR="$env:LLVM_DIR\build\lib\cmake\llvm" `
              -DClang_DIR="$env:LLVM_DIR\build\lib\cmake\clang" `
              -DCMAKE_INSTALL_PREFIX="$env:CPPINTEROP_DIR" `
              -DBUILD_SHARED_LIBS=ON `
              -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              ..

        cmake --build . --target install --parallel $env:ncpus

    # - name: Test CppInterOp
    #   shell: pwsh
    #   run: |
    #     $env:ncpus = $([Environment]::ProcessorCount)
    #     Set-Location build
    #     cmake --build . --target check-cppinterop --parallel $env:ncpus

    - name: Generate Cling build manifest
      shell: pwsh
      run: |
        $env:PWD_DIR = $PWD.Path
        $env:LLVM_DIR = "$env:PWD_DIR\llvm-project"
        $env:CLING_DIR = "$env:PWD_DIR\cling"
        $env:CB_PYTHON_DIR = "$env:PWD_DIR\cppyy-backend\python"
        $env:CPPINTEROP_DIR = "$env:CB_PYTHON_DIR\cppyy_backend"
        $manifestPath = "$env:PWD_DIR\cling-build-manifest.txt"

        $header = @"
# CppInterOp Windows Cling Build Manifest
# Generated: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
# PWD_DIR     : $env:PWD_DIR
# LLVM_DIR    : $env:LLVM_DIR
# CLING_DIR   : $env:CLING_DIR
# CB_PYTHON_DIR   : $env:CB_PYTHON_DIR
# CPPINTEROP_DIR  : $env:CPPINTEROP_DIR

"@
        Set-Content -Path $manifestPath -Value $header -Encoding utf8

        function Get-GitCommit($dir) {
            if (Test-Path (Join-Path $dir '.git')) {
                Push-Location $dir
                $rev = git rev-parse HEAD 2>$null
                $tag = git describe --tags --always 2>$null
                Pop-Location
                if ($tag) { "$rev  ($tag)" } else { "$rev" }
            } else { '<not a git checkout>' }
        }

        '[GIT]' | Out-File -FilePath $manifestPath -Append -Encoding utf8
        "llvm-project : $(Get-GitCommit $env:LLVM_DIR)"   | Out-File -FilePath $manifestPath -Append -Encoding utf8
        "cling        : $(Get-GitCommit $env:CLING_DIR)"  | Out-File -FilePath $manifestPath -Append -Encoding utf8

        $exts = @('*.dll', '*.lib', '*.pdb', '*.exe', '*.exp')

        "[llvm-project/build/bin  ($($exts -join ', '))]" | Out-File -FilePath $manifestPath -Append -Encoding utf8
        if (Test-Path "$env:LLVM_DIR\build\bin") {
            Get-ChildItem -Path "$env:LLVM_DIR\build\bin" -Recurse -File -Include $exts |
                Select-Object FullName,
                              @{N='Size(KB)';E={[int]($_.Length/1024)}},
                              LastWriteTime |
                Format-Table -AutoSize |
                Out-String -Width 4096 |
                Out-File -FilePath $manifestPath -Append -Encoding utf8
        } else {
            '(not found)' | Out-File -FilePath $manifestPath -Append -Encoding utf8
        }

        "[llvm-project/build/lib  ($($exts -join ', '))]" | Out-File -FilePath $manifestPath -Append -Encoding utf8
        if (Test-Path "$env:LLVM_DIR\build\lib") {
            Get-ChildItem -Path "$env:LLVM_DIR\build\lib" -Recurse -File -Include $exts |
                Select-Object FullName,
                              @{N='Size(KB)';E={[int]($_.Length/1024)}},
                              LastWriteTime |
                Format-Table -AutoSize |
                Out-String -Width 4096 |
                Out-File -FilePath $manifestPath -Append -Encoding utf8
        } else {
            '(not found)' | Out-File -FilePath $manifestPath -Append -Encoding utf8
        }

        "[cppyy-backend/python/cppyy_backend  ($($exts -join ', '))]" | Out-File -FilePath $manifestPath -Append -Encoding utf8
        if (Test-Path $env:CPPINTEROP_DIR) {
            Get-ChildItem -Path $env:CPPINTEROP_DIR -Recurse -File -Include $exts |
                Select-Object FullName,
                              @{N='Size(KB)';E={[int]($_.Length/1024)}},
                              LastWriteTime |
                Format-Table -AutoSize |
                Out-String -Width 4096 |
                Out-File -FilePath $manifestPath -Append -Encoding utf8
        } else {
            '(not found)' | Out-File -FilePath $manifestPath -Append -Encoding utf8
        }

        Write-Host "Manifest written: $manifestPath"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: cppinterop-windows-cling
        path: |
          cppyy-backend/python/cppyy_backend
          build/lib
          llvm-project/build/bin
          llvm-project/build/lib
          cling-build-manifest.txt
        if-no-files-found: error
        retention-days: 7

    
