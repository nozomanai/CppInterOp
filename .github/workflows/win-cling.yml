name: Win11 Cling Build

on:
  # pull_request:
  #   branches: [main]
  # push:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build-win11-cling:
    name: win11-msvc-cling-llvm20
    runs-on: windows-2025
    strategy:
      fail-fast: false

    steps:
    - name: Checkout CppInterOp
      uses: actions/checkout@v6

    - name: Clone cppyy-backend
      run: |
        git clone --depth=1 https://github.com/compiler-research/cppyy-backend.git

    - name: Clone Cling and LLVM
      run: |
        git clone --depth=1 --branch v1.3 https://github.com/root-project/cling.git
        git clone --depth=1 -b cling-llvm20-20260119-01 https://github.com/root-project/llvm-project.git

    - name: Build Cling and LLVM
      shell: pwsh
      run: |
        $env:ncpus = $([Environment]::ProcessorCount)
        $env:PWD_DIR = $PWD.Path
        $env:CLING_DIR = "$env:PWD_DIR\cling"

        New-Item -ItemType Directory -Force -Path llvm-project\build | Out-Null
        Set-Location llvm-project\build

        cmake -DLLVM_ENABLE_PROJECTS=clang `
              -DLLVM_EXTERNAL_PROJECTS=cling `
              -DLLVM_EXTERNAL_CLING_SOURCE_DIR="$env:CLING_DIR" `
              -DLLVM_TARGETS_TO_BUILD="host;NVPTX" `
              -DCMAKE_BUILD_TYPE=Release `
              -DLLVM_ENABLE_ASSERTIONS=ON `
              -DCLANG_ENABLE_STATIC_ANALYZER=OFF `
              -DCLANG_ENABLE_ARCMT=OFF `
              -DCLANG_ENABLE_FORMAT=OFF `
              -DCLANG_ENABLE_BOOTSTRAP=OFF `
              ../llvm

        cmake --build . --target clang --parallel $env:ncpus
        cmake --build . --target cling --parallel $env:ncpus

    - name: Set environment variables
      shell: pwsh
      run: |
        $env:PWD_DIR = $PWD.Path
        $env:LLVM_DIR = "$env:PWD_DIR\llvm-project"
        $env:CLING_DIR = "$env:PWD_DIR\cling"
        $env:CLING_BUILD_DIR = "$env:PWD_DIR\cling\build"
        $env:CB_PYTHON_DIR = "$env:PWD_DIR\cppyy-backend\python"
        $env:CPPINTEROP_DIR = "$env:CB_PYTHON_DIR\cppyy_backend"

        # Export for subsequent steps
        echo "LLVM_DIR=$env:LLVM_DIR" >> $env:GITHUB_ENV
        echo "CLING_DIR=$env:CLING_DIR" >> $env:GITHUB_ENV
        echo "CLING_BUILD_DIR=$env:CLING_BUILD_DIR" >> $env:GITHUB_ENV
        echo "CB_PYTHON_DIR=$env:CB_PYTHON_DIR" >> $env:GITHUB_ENV
        echo "CPPINTEROP_DIR=$env:CPPINTEROP_DIR" >> $env:GITHUB_ENV
        echo "PWD_DIR=$env:PWD_DIR" >> $env:GITHUB_ENV

    - name: Build CppInterOp
      shell: pwsh
      run: |
        $env:ncpus = $([Environment]::ProcessorCount)

        New-Item -ItemType Directory -Force -Path build | Out-Null
        Set-Location build

        cmake -DCPPINTEROP_USE_CLING=ON `
              -DCPPINTEROP_USE_REPL=Off `
              -DCling_DIR="$env:LLVM_DIR\build\tools\cling" `
              -DLLVM_DIR="$env:LLVM_DIR\build\lib\cmake\llvm" `
              -DClang_DIR="$env:LLVM_DIR\build\lib\cmake\clang" `
              -DCMAKE_INSTALL_PREFIX="$env:CPPINTEROP_DIR" `
              -DBUILD_SHARED_LIBS=ON `
              ..

        cmake --build . --target install --parallel $env:ncpus

    - name: Test CppInterOp
      shell: pwsh
      run: |
        $env:ncpus = $([Environment]::ProcessorCount)
        Set-Location build
        cmake --build . --target check-cppinterop --parallel $env:ncpus

    - name: Upload build artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: win11-cling-build-logs
        path: |
          build/CMakeFiles/CMakeOutput.log
          build/CMakeFiles/CMakeError.log
          build/Testing/Temporary/
        retention-days: 7
